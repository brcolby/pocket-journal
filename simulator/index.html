<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pocket Journal Simulator</title>
    <link rel="stylesheet" href="src/styles.css?v=review-shell-1">
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>Pocket Journal</h1>
        <p>Firmware simulator</p>
      </div>
      <span class="runtime-status"><i aria-hidden="true"></i>Firmware WASM</span>
    </header>
    <main class="app">
      <section class="device" aria-label="Simulated Pocket Journal device">
        <div class="device-stage">
          <div class="device-frame">
            <canvas id="display" width="200" height="200" aria-label="Pocket Journal 200 by 200 e-paper display"></canvas>
            <span class="device-mark">PJ</span>
          </div>
        </div>
        <div class="device-buttons" aria-label="Simulated hardware buttons">
          <button id="simAuxButton" type="button" title="Auxiliary button"><b>A</b><span>AUX</span></button>
          <button id="simPowerButton" type="button" title="Power button"><b>D</b><span>POWER</span></button>
        </div>
      </section>
      <aside class="panel" aria-label="Review controls">
        <div class="panel-heading">
          <div class="status">
            <span>State</span>
            <strong id="stateName">static</strong>
          </div>
          <div class="controls" aria-label="Runtime controls">
            <button id="powerButton" type="button" title="Toggle power" aria-label="Toggle power">&#9211;</button>
            <button id="resetButton" type="button" title="Reset simulator" aria-label="Reset simulator">&#8635;</button>
            <button id="bootButton" type="button" title="Press AUX" aria-label="Press AUX">A</button>
            <button id="debugDumpButton" type="button" title="Flush debug log" aria-label="Flush debug log">LOG</button>
          </div>
        </div>
        <section class="review-panel" aria-labelledby="reviewHeading">
          <div class="section-heading">
            <h2 id="reviewHeading">Review view</h2>
            <button id="captureButton" class="compact-button" type="button" title="Save display PNG">PNG</button>
          </div>
          <label for="viewPicker">Screen</label>
          <div class="view-picker-row">
            <select id="viewPicker">
              <option value="static">Resting</option>
              <option value="time_temp">Clock</option>
              <option value="home">Home</option>
              <option value="notes">Notes</option>
              <option value="record">Record</option>
              <option value="listen">Listen</option>
              <option value="read">Read</option>
              <option value="time">Time tools</option>
              <option value="alarm">Alarm</option>
              <option value="stopwatch">Stopwatch</option>
              <option value="timer">Timer</option>
              <option value="interval">Interval</option>
              <option value="settings">Settings</option>
              <option value="sync">Sync</option>
              <option value="volume">Volume</option>
              <option value="display">Display</option>
            </select>
            <button id="openViewButton" type="button">Open</button>
          </div>
        </section>
        <div class="action-status">
          <span>Last input</span>
          <strong id="actionLine">ready</strong>
        </div>
        <section class="key-panel" aria-labelledby="keyHeading">
          <h2 id="keyHeading">Hardware keys</h2>
          <dl>
            <div><dt><kbd>A</kbd></dt><dd>AUX short; press twice for double</dd></div>
            <div><dt><kbd>Shift</kbd> + <kbd>A</kbd></dt><dd>AUX long</dd></div>
            <div><dt><kbd>D</kbd></dt><dd>Power / wake</dd></div>
            <div><dt><kbd>R</kbd></dt><dd>Reset</dd></div>
          </dl>
        </section>
        <section class="history-panel">
          <h2>Activity</h2>
          <ol id="history"></ol>
        </section>
      </aside>
    </main>
    <script>
      window.__pocketJournalSimulatorModuleLoaded = false;
      window.__pocketJournalSimulatorDebugLogKey = "pocketJournalSimulatorDebugLog";
      window.__pocketJournalSimulatorPersistEntries = (entries, reason = "bootstrap") => {
        const body = JSON.stringify({
          reason,
          generatedAt: new Date().toISOString(),
          href: window.location.href,
          userAgent: navigator.userAgent,
          entries
        });
        if (navigator.sendBeacon) {
          const blob = new Blob([body], { type: "application/json" });
          if (navigator.sendBeacon("/__simulator_logs", blob)) {
            return;
          }
        }
        fetch("/__simulator_logs", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body,
          keepalive: true
        }).catch((error) => {
          console.warn("Unable to persist simulator debug log to .logs/", error);
        });
      };
      window.__pocketJournalSimulatorLog = (event, details = {}) => {
        const key = window.__pocketJournalSimulatorDebugLogKey;
        const entry = {
          sequence: 1,
          time: new Date().toISOString(),
          event,
          details: {
            location: window.location.href,
            userAgent: navigator.userAgent,
            ...details
          }
        };
        try {
          const entries = JSON.parse(localStorage.getItem(key) || "[]");
          entry.sequence = entries.length + 1;
          entries.push(entry);
          localStorage.setItem(key, JSON.stringify(entries.slice(-500)));
        } catch (error) {
          console.warn("Unable to persist simulator bootstrap log locally", error);
        }
        window.__pocketJournalSimulatorPersistEntries([entry], "bootstrap");
        return entry;
      };
      window.addEventListener("error", (event) => {
        window.__pocketJournalSimulatorLog("bootstrap.window.error", {
          message: event.message,
          filename: event.filename,
          lineno: event.lineno,
          colno: event.colno,
          error: event.error ? {
            name: event.error.name,
            message: event.error.message,
            stack: event.error.stack
          } : null
        });
      });
      window.addEventListener("unhandledrejection", (event) => {
        window.__pocketJournalSimulatorLog("bootstrap.window.unhandledrejection", {
          reason: String(event.reason)
        });
      });
      window.__pocketJournalSimulatorLog("bootstrap.inline.ready");
      document.querySelector("#debugDumpButton").addEventListener("click", () => {
        window.__pocketJournalSimulatorLog("bootstrap.flush.click", {
          moduleLoaded: window.__pocketJournalSimulatorModuleLoaded
        });
      });
      window.setTimeout(() => {
        if (window.__pocketJournalSimulatorModuleLoaded) {
          return;
        }
        const message = "simulator module did not start; check .logs/simulator-debug-latest.json";
        document.querySelector("#actionLine").textContent = message;
        window.__pocketJournalSimulatorLog("module.watchdog.timeout", { message });
      }, 1500);
    </script>
    <script id="simulatorModuleScript" type="module" src="src/main.js?v=firmware-wasm-1"></script>
  </body>
</html>
